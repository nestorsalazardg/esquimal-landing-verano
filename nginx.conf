server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ─────────────────────────────────────────────────────────────
    # SEGURIDAD 1: Ocultar versión de Nginx en cabeceras y páginas
    # de error. Sin esto, un atacante sabe exactamente qué versión
    # atacar si tiene vulnerabilidades conocidas (CVEs).
    # ─────────────────────────────────────────────────────────────
    server_tokens off;

    # ─────────────────────────────────────────────────────────────
    # SEGURIDAD 2: Cabeceras HTTP de seguridad
    # ─────────────────────────────────────────────────────────────

    # Content-Security-Policy (CSP)
    # Le dice al navegador exactamente de qué dominios puede cargar
    # recursos. Si un atacante inyecta un <script src="malo.com">,
    # el navegador lo bloquea porque "malo.com" no está en la lista.
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self' 'unsafe-inline'
                     https://connect.facebook.net
                     https://www.googletagmanager.com
                     https://www.google-analytics.com
                     https://www.youtube.com
                     https://www.youtube-nocookie.com;
         style-src   'self' 'unsafe-inline'
                     https://fonts.googleapis.com;
         font-src    'self'
                     https://fonts.gstatic.com;
         img-src     'self' data:
                     https://images.unsplash.com
                     https://www.facebook.com
                     https://www.google-analytics.com;
         frame-src   https://www.youtube.com
                     https://www.youtube-nocookie.com;
         connect-src 'self'
                     https://www.facebook.com
                     https://connect.facebook.net
                     https://www.google-analytics.com
                     https://www.googletagmanager.com;
         object-src  'none';
         base-uri    'self';
         form-action 'self';"
        always;

    # X-Frame-Options
    # Impide que tu página sea cargada dentro de un <iframe> en otro
    # sitio. Protege contra ataques de "Clickjacking" donde alguien
    # pone tu página invisible encima de un botón trampa.
    add_header X-Frame-Options "SAMEORIGIN" always;

    # X-Content-Type-Options
    # Impide que el navegador "adivine" el tipo de archivo. Sin esto,
    # un atacante podría subir un archivo .jpg que en realidad es un
    # script y el navegador lo ejecutaría.
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer-Policy
    # Controla qué información de URL se envía cuando el usuario hace
    # clic en un enlace. "strict-origin-when-cross-origin" es el
    # balance ideal: no filtra rutas internas a sitios externos.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy (antes Feature-Policy)
    # Desactiva APIs del navegador que esta página no necesita.
    # Reduce la superficie de ataque si hubiera una inyección XSS.
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
        always;

    # ─────────────────────────────────────────────────────────────
    # SEGURIDAD 3: Deshabilitar listado de directorios
    # Sin esto, si alguien va a /assets/ vería todos tus archivos.
    # ─────────────────────────────────────────────────────────────
    autoindex off;

    # ─────────────────────────────────────────────────────────────
    # SEGURIDAD 4: Bloquear acceso a archivos sensibles
    # Nadie debería poder descargar el Dockerfile o el .git desde
    # el navegador si accidentalmente quedaran en la carpeta pública.
    # ─────────────────────────────────────────────────────────────
    location ~* ^/(Dockerfile|\.git|\.env|\.gitignore) {
        deny all;
        return 404;
    }

    # ─────────────────────────────────────────────────────────────
    # RENDIMIENTO + SEGURIDAD: Cache de assets estáticos
    # ─────────────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback: cualquier ruta desconocida sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────────────────────
    # Páginas de error personalizadas (no revelan info del servidor)
    # ─────────────────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
